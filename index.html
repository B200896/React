<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- <textarea name="" id="" cols="30" rows="10"></textarea> -->
    <!-- <button id="btn">Submit</button>
    <h1 id="h"></h1> -->

    <input type="text" placeholder="Enter Your Number 1" id="inp">
    <input type="text" placeholder="Enter Your Number 2" id="inp1">
    <button id="btn">Swap</button>
    

    <script>
        
        // document.getElementById("btn").onclick = function(){
              
        //     document.getElementById("h").innerHTML = "Hello"
        // }

        document.getElementById("btn").onclick = function(){

            let a = Number(document.getElementById("inp").value);
            let b = Number(document.getElementById("inp1").value);
            let temp = a;
            a = b;
            b = temp;
            
            document.getElementById("inp").value = a;
            document.getElementById("inp1").value = b;
        }
      
    </script>
    
</body>
</html>
